<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <clipPath id="circle"><circle cx="90" cy="90" r="85"/></clipPath>
  </defs>
  <circle cx="90" cy="90" r="90" fill="#1a1a2e"/>
  <g clip-path="url(#circle)">
    <!-- Taiwan flag (left half) -->
    <rect x="5" y="5" width="85" height="170" fill="#fe0000"/>
    <rect x="5" y="5" width="42.5" height="85" fill="#000095"/>
    <!-- White sun -->
    <circle cx="26.25" cy="47.5" r="14" fill="#fff"/>
    <circle cx="26.25" cy="47.5" r="10" fill="#000095"/>
    <circle cx="26.25" cy="47.5" r="8" fill="#fff"/>
    <!-- Sun rays (12 triangular rays) -->
    <g fill="#fff" transform="translate(26.25,47.5)">
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(0)"/>
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(30)"/>
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(60)"/>
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(90)"/>
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(120)"/>
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(150)"/>
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(180)"/>
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(210)"/>
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(240)"/>
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(270)"/>
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(300)"/>
      <polygon points="0,-14 2,-18 -2,-18" transform="rotate(330)"/>
    </g>

    <!-- US flag (right half) -->
    <!-- Red and white stripes -->
    <rect x="90" y="5" width="85" height="170" fill="#fff"/>
    <rect x="90" y="5" width="85" height="13.08" fill="#B22234"/>
    <rect x="90" y="31.15" width="85" height="13.08" fill="#B22234"/>
    <rect x="90" y="57.31" width="85" height="13.08" fill="#B22234"/>
    <rect x="90" y="83.46" width="85" height="13.08" fill="#B22234"/>
    <rect x="90" y="109.62" width="85" height="13.08" fill="#B22234"/>
    <rect x="90" y="135.77" width="85" height="13.08" fill="#B22234"/>
    <rect x="90" y="161.92" width="85" height="13.08" fill="#B22234"/>
    <!-- Blue canton -->
    <rect x="90" y="5" width="36" height="72" fill="#3C3B6E"/>
    <!-- Stars (simplified 3x3 grid) -->
    <g fill="#fff" font-size="8" font-family="sans-serif" text-anchor="middle">
      <text x="100" y="20">★</text><text x="112" y="20">★</text><text x="124" y="20">★</text>
      <text x="106" y="32">★</text><text x="118" y="32">★</text>
      <text x="100" y="44">★</text><text x="112" y="44">★</text><text x="124" y="44">★</text>
      <text x="106" y="56">★</text><text x="118" y="56">★</text>
      <text x="100" y="68">★</text><text x="112" y="68">★</text><text x="124" y="68">★</text>
    </g>
  </g>
  <!-- Divider line -->
  <line x1="90" y1="5" x2="90" y2="175" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Outer ring -->
  <circle cx="90" cy="90" r="85" fill="none" stroke="#1a1a2e" stroke-width="3"/>
</svg>
