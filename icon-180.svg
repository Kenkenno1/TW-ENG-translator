<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="tb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BA3F5"/>
      <stop offset="100%" stop-color="#2E6BC4"/>
    </linearGradient>
    <filter id="gl">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4A90D9" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 碳灰底色帶冷藍調 -->
  <rect width="180" height="180" fill="#1A1D28"/>

  <!-- 雙向幾何迴廊：兩個方向相反的箭頭首尾相連 -->
  <g filter="url(#gl)" stroke="url(#tb)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- 上方右行線 -->
    <line x1="53" y1="78" x2="127" y2="78"/>
    <!-- 右側導角連接 -->
    <polyline points="127,78 140,90 127,102"/>
    <!-- 下方左行線 -->
    <line x1="127" y1="102" x2="53" y2="102"/>
    <!-- 左側導角連接 -->
    <polyline points="53,102 40,90 53,78"/>
    <!-- 右箭頭 -->
    <polyline points="117,68 127,78 117,88"/>
    <!-- 左箭頭 -->
    <polyline points="63,112 53,102 63,92"/>
  </g>
</svg>
